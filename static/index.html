<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دستیار پخت غذای ایرانی</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <h1>دستیار پخت غذای ایرانی</h1>
            <p>برای شروع، نام خود را وارد کنید</p>
            <form id="login-form">
                <input type="text" id="login-input" placeholder="نام شما" autocomplete="off" required>
                <button type="submit">ورود</button>
            </form>
        </div>
    </div>

    <!-- Chat App -->
    <div id="app" class="app hidden">

        <!-- Header -->
        <header class="header">
            <h1>دستیار پخت غذای ایرانی</h1>
            <button id="reset-btn" class="reset-btn">شروع مجدد</button>
        </header>

        <!-- Selected Recipe Banner -->
        <div id="recipe-banner" class="recipe-banner hidden"></div>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <div class="welcome-message">
                <p>سلام! عکس مواد غذایی خود را بفرستید یا بنویسید چه چیزی در دسترس دارید تا بهترین دستورهای غذایی را پیشنهاد دهم.</p>
            </div>
        </main>

        <!-- Recipe Cards Container -->
        <div id="recipes-container" class="recipes-container hidden"></div>

        <!-- Input Area -->
        <div class="input-area">
            <div id="image-preview" class="image-preview hidden">
                <img id="preview-img" src="" alt="پیش‌نمایش">
                <button id="remove-image" class="remove-image">&times;</button>
            </div>
            <form id="chat-form" class="chat-form">
                <label for="image-input" class="image-btn" title="ارسال تصویر">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </label>
                <input type="file" id="image-input" accept="image/*" class="hidden">
                <input type="text" id="message-input" placeholder="پیام خود را بنویسید..." autocomplete="off">
                <button type="submit" class="send-btn" id="send-btn" title="ارسال">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
